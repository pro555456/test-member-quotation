name: GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: game_qa_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      PORT: 3001
      COOKIE_SECURE: 'false'
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: root
      DB_NAME: game_qa_platform
      MONGODB_URL: mongodb://127.0.0.1:27017/products
      JWT_SECRET: github-release-jwt-secret
      JWT_REFRESH_SECRET: github-release-refresh-secret
      QUOTE_IMPORT_DEFAULT_SHEET: 2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -proot --silent; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Verify release build
        run: npm run release:check

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            database/mysql_game_qa_platform_schema.sql
            database/migrate_shop_to_game_qa_platform.sql
            docs/release-process.md
